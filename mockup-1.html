<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mockup 1 — Stone Gates</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Cinzel+Decorative:wght@400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden}

body {
  font-family:'Cinzel',serif;
  background:#1c1610;
  display:flex;
  align-items:center;
  justify-content:center;
  min-height:100vh;
  position:relative;
  overflow:hidden;
}

/* ── SCENE BACKGROUND ── */
.scene {
  position:absolute;
  inset:0;
  /* Stone wall base color */
  background-color: #2a2318;
  /* Brick/block pattern */
  background-image:
    /* Horizontal mortar */
    repeating-linear-gradient(0deg,transparent 0,transparent 59px,rgba(0,0,0,.45) 59px,rgba(0,0,0,.45) 63px),
    /* Vertical mortar */
    repeating-linear-gradient(90deg,transparent 0,transparent 89px,rgba(0,0,0,.3) 89px,rgba(0,0,0,.3) 93px);
  /* Stone surface variation */
  filter:contrast(1.1);
}
/* Stone color variation overlay */
.scene::before {
  content:'';
  position:absolute;inset:0;
  background:
    radial-gradient(ellipse 80% 100% at 50% 50%, rgba(60,48,28,.6) 0%, transparent 70%),
    radial-gradient(ellipse 30% 50% at 15% 35%, rgba(210,100,15,.22) 0%, transparent 100%),
    radial-gradient(ellipse 30% 50% at 85% 35%, rgba(210,100,15,.22) 0%, transparent 100%),
    radial-gradient(ellipse 60% 40% at 50% 0%, rgba(0,0,0,.7) 0%, transparent 100%),
    radial-gradient(ellipse 80% 50% at 50% 100%, rgba(0,0,0,.85) 0%, transparent 100%);
  pointer-events:none;
}
/* Floor at the very bottom */
.scene::after {
  content:'';
  position:absolute;
  bottom:0;left:0;right:0;
  height:15%;
  background:linear-gradient(180deg,transparent 0%,rgba(0,0,0,.8) 100%);
}

/* ── CYLINDRICAL PILLARS ── */
.pillar {
  position:absolute;
  top:0;bottom:0;
  width:clamp(90px,11vw,150px);
  /* Cylinder illusion: light center → dark edges */
  background:
    radial-gradient(ellipse 65% 100% at 38% 50%,
      #5c5040 0%,
      #4e4434 18%,
      #3e3828 40%,
      #302c20 60%,
      #20201a 80%,
      #141210 100%
    );
  z-index:5;
}
.pillar::before {
  content:'';
  position:absolute;inset:0;
  background:
    repeating-linear-gradient(0deg,
      transparent 0,transparent 58px,
      rgba(0,0,0,.35) 58px,rgba(0,0,0,.35) 62px
    );
}
.pillar-l{left:0; box-shadow:8px 0 40px rgba(0,0,0,.8),inset -12px 0 30px rgba(0,0,0,.7)}
.pillar-r{right:0;box-shadow:-8px 0 40px rgba(0,0,0,.8),inset 12px 0 30px rgba(0,0,0,.7)}

/* Pillar cap */
.pillar::after {
  content:'';
  position:absolute;
  top:0;left:-6px;right:-6px;
  height:18px;
  background:linear-gradient(180deg,#5a5040 0%,#383020 60%,#28221a 100%);
  border-bottom:2px solid rgba(0,0,0,.6);
  box-shadow:0 4px 12px rgba(0,0,0,.7);
}

/* ── TORCH ── */
.torch {
  position:absolute;
  top:clamp(90px,15vh,180px);
  /* Center horizontally in pillar */
  left:50%;
  transform:translateX(-50%);
  display:flex;
  flex-direction:column;
  align-items:center;
  width:28px;
  z-index:10;
}

/* Wall bracket */
.bracket {
  width:22px;height:10px;
  background:linear-gradient(180deg,#4a3c20 0%,#2e2410 100%);
  border:1px solid #5a4a28;
  border-bottom:2px solid #1a1408;
  box-shadow:0 2px 6px rgba(0,0,0,.7);
  border-radius:0 0 4px 4px;
  margin-bottom:2px;
}
.torch-body {
  width:8px;height:24px;
  background:linear-gradient(180deg,#6b4a20 0%,#3d2a0e 60%,#2a1c08 100%);
  border:1px solid #4a3010;
  box-shadow:1px 0 4px rgba(0,0,0,.5);
  position:relative;
}
.torch-body::after {
  content:'';
  position:absolute;
  top:-4px;left:50%;transform:translateX(-50%);
  width:12px;height:8px;
  background:linear-gradient(180deg,#5a3a18 0%,#3a2808 100%);
  border-radius:2px 2px 0 0;
  border:1px solid #6a4a20;
}

/* Glow halo */
.t-glow {
  position:absolute;
  top:-36px;left:50%;transform:translateX(-50%);
  width:100px;height:100px;
  border-radius:50%;
  background:radial-gradient(circle,rgba(255,140,20,.4) 0%,rgba(255,80,0,.2) 40%,transparent 70%);
  filter:blur(8px);
  animation:glow 1.6s ease-in-out infinite alternate;
  pointer-events:none;
}
@keyframes glow{
from{opacity:.7;transform:translateX(-50%) scale(1)}
to{opacity:1;transform:translateX(-50%) scale(1.2)}
}

/* Flames */
.flames {
  position:relative;
  width:28px;height:52px;
  margin-top:-4px;
  filter:
    drop-shadow(0 0 6px rgba(255,110,0,.9))
    drop-shadow(0 0 18px rgba(255,50,0,.6))
    drop-shadow(0 0 35px rgba(200,40,0,.3));
}
.fl{
  position:absolute;bottom:0;left:50%;
  transform-origin:bottom center;
  border-radius:50% 50% 30% 30%;
}
.fl1{width:24px;height:46px;margin-left:-12px;
  background:radial-gradient(ellipse at 50% 85%,#cc2800 0%,#991800 55%,transparent 100%);
  animation:f1 .38s ease-in-out infinite alternate}
.fl2{width:18px;height:36px;margin-left:-9px;
  background:radial-gradient(ellipse at 50% 85%,#ff5c00 0%,#dd2800 55%,transparent 100%);
  animation:f2 .3s ease-in-out infinite alternate}
.fl3{width:13px;height:26px;margin-left:-6.5px;
  background:radial-gradient(ellipse at 50% 85%,#ff9900 0%,#ff5000 55%,transparent 100%);
  animation:f3 .25s ease-in-out infinite alternate}
.fl4{width:8px;height:16px;margin-left:-4px;
  background:radial-gradient(ellipse at 50% 80%,#fff0a0 0%,#ffd020 45%,#ff9900 70%,transparent 100%);
  animation:f4 .2s ease-in-out infinite alternate}
@keyframes f1{0%{transform:translateX(-50%) scaleX(1) scaleY(1) rotate(-3deg)}50%{transform:translateX(-50%) scaleX(.88) scaleY(1.09) rotate(2.5deg)}100%{transform:translateX(-50%) scaleX(1.08) scaleY(.93) rotate(-1.5deg)}}
@keyframes f2{0%{transform:translateX(-50%) scaleX(1.05) scaleY(.96) rotate(2deg)}50%{transform:translateX(-50%) scaleX(.9) scaleY(1.12) rotate(-3deg)}100%{transform:translateX(-50%) scaleX(1.1) scaleY(.9) rotate(1.5deg)}}
@keyframes f3{0%{transform:translateX(-50%) scaleX(.92) scaleY(1.1) rotate(-2deg)}50%{transform:translateX(-50%) scaleX(1.12) scaleY(.88) rotate(3deg)}100%{transform:translateX(-50%) scaleX(.88) scaleY(1.08) rotate(-1.5deg)}}
@keyframes f4{0%{transform:translateX(-50%) scaleX(1) scaleY(1)}50%{transform:translateX(-50%) scaleX(.78) scaleY(1.22)}100%{transform:translateX(-50%) scaleX(1.12) scaleY(.84)}}

/* ── ARCHWAY ── */
.arch {
  position:absolute;
  bottom:-20px;left:50%;transform:translateX(-50%);
  width:clamp(220px,32vw,400px);
  height:clamp(160px,28vh,300px);
  border:12px solid #302a20;
  border-bottom:none;
  border-radius:50% 50% 0 0 / 100% 100% 0 0;
  background:linear-gradient(180deg,#0a0806 0%,#050402 100%);
  z-index:1;
  /* Keystone highlight */
  box-shadow:
    inset 0 30px 80px rgba(0,0,0,.95),
    0 0 0 3px #222018,
    0 0 0 6px #1a1810,
    0 -8px 30px rgba(0,0,0,.7),
    /* Slight torchlight at top of arch */
    0 -4px 20px rgba(180,100,20,.1);
}
.arch::before {
  content:'';
  position:absolute;
  inset:10px 10px 0;
  border:3px solid rgba(255,255,255,.04);
  border-bottom:none;
  border-radius:50% 50% 0 0 / 100% 100% 0 0;
}
/* Keystone */
.arch::after {
  content:'';
  position:absolute;
  top:-14px;left:50%;transform:translateX(-50%);
  width:30px;height:22px;
  background:linear-gradient(180deg,#3e3828 0%,#2a2418 100%);
  border:2px solid #4a4230;
  clip-path:polygon(10% 0%,90% 0%,100% 100%,0% 100%);
}

/* ── LOGIN PANEL ── */
.panel {
  position:relative;
  z-index:20;
  width:clamp(280px,86vw,370px);
  padding:30px 30px 26px;
  /* Stone panel: lighter than background */
  background:
    linear-gradient(160deg,#4e4838 0%,#3e3828 45%,#342e22 100%);
  border:3px solid #6a6050;
  box-shadow:
    0 0 0 1px #252018,
    inset 0 0 0 1px rgba(255,255,255,.05),
    inset 0 0 50px rgba(0,0,0,.35),
    0 0 0 8px rgba(0,0,0,.3),
    0 30px 80px rgba(0,0,0,.95);
  text-align:center;
}
/* Panel stone texture */
.panel::before {
  content:'';
  position:absolute;inset:0;
  background:
    repeating-linear-gradient(0deg,transparent 0,transparent 13px,rgba(0,0,0,.08) 13px,rgba(0,0,0,.08) 14px);
  pointer-events:none;
  border-radius:0;
}
/* Corner ornaments */
.corner {position:absolute;width:20px;height:20px;border-color:#c8a96e;border-style:solid;}
.tl{top:7px;left:7px;border-width:2px 0 0 2px}
.tr{top:7px;right:7px;border-width:2px 2px 0 0}
.bl{bottom:7px;left:7px;border-width:0 0 2px 2px}
.br{bottom:7px;right:7px;border-width:0 2px 2px 0}

.logo {
  font-family:'Cinzel Decorative',serif;
  font-size:clamp(1.9rem,4.5vw,2.9rem);
  font-weight:700;
  color:#f0d878;
  letter-spacing:.35em;
  text-shadow:
    0 1px 0 #1a1408,
    0 2px 0 #100e06,
    0 3px 8px rgba(0,0,0,.9),
    0 0 25px rgba(220,180,70,.45);
  margin-bottom:2px;
}
.sub {
  font-family:'Cinzel',serif;
  font-style:italic;
  font-size:.78rem;
  color:#8a7a50;
  letter-spacing:.15em;
  margin-bottom:22px;
}
.divider {
  height:2px;
  background:linear-gradient(90deg,transparent,#7a6838,#c8a96e 50%,#7a6838,transparent);
  margin-bottom:22px;
}
input[type=password]{
  width:100%;padding:9px 14px;
  background:rgba(0,0,0,.6);
  border:1px solid #504838;border-bottom:2px solid #7a6838;
  color:#dcc870;font-family:'Cinzel',serif;font-size:.85rem;
  letter-spacing:.12em;outline:none;transition:all .2s;
  margin-bottom:14px;text-align:center;
}
input[type=password]:focus{border-color:#c8a96e;background:rgba(0,0,0,.75);box-shadow:0 0 12px rgba(200,169,80,.25)}
input::placeholder{color:#4a4030}

.btn-enter {
  width:100%;padding:11px;
  background:linear-gradient(180deg,#5e5442 0%,#4a4232 55%,#3a3228 100%);
  border:1px solid #706050;border-top:1px solid #7a6a58;border-bottom:3px solid #201c14;
  color:#e8d878;font-family:'Cinzel',serif;font-size:.78rem;font-weight:700;
  letter-spacing:.2em;text-transform:uppercase;cursor:pointer;
  transition:all .12s;
  text-shadow:0 1px 3px rgba(0,0,0,.8);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.07),0 2px 8px rgba(0,0,0,.6);
}
.btn-enter:hover{
  background:linear-gradient(180deg,#706050 0%,#5a5040 55%,#484030 100%);
  color:#fff8d8;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.1),0 0 16px rgba(200,169,80,.3);
}
.btn-enter:active{transform:translateY(2px);border-bottom-width:1px}
.err{margin-top:10px;color:#ff7755;font-size:.75rem;font-style:italic;min-height:16px;text-shadow:0 0 8px rgba(200,50,0,.5)}
</style>
</head>
<body>
<div class="scene"></div>

<div class="pillar pillar-l">
  <div class="torch">
    <div class="t-glow"></div>
    <div class="flames"><div class="fl fl1"></div><div class="fl fl2"></div><div class="fl fl3"></div><div class="fl fl4"></div></div>
    <div class="torch-body"></div>
    <div class="bracket"></div>
  </div>
</div>

<div class="pillar pillar-r">
  <div class="torch">
    <div class="t-glow"></div>
    <div class="flames"><div class="fl fl1"></div><div class="fl fl2"></div><div class="fl fl3"></div><div class="fl fl4"></div></div>
    <div class="torch-body"></div>
    <div class="bracket"></div>
  </div>
</div>

<div class="arch"></div>

<div class="panel">
  <span class="corner tl"></span><span class="corner tr"></span>
  <span class="corner bl"></span><span class="corner br"></span>
  <div class="logo">HALO</div>
  <div class="sub">Campaña de Dungeons &amp; Dragons</div>
  <div class="divider"></div>
  <input type="password" placeholder="Contraseña de acceso...">
  <button class="btn-enter">&#9660; Entrar al Reino &#9660;</button>
  <div class="err"></div>
</div>

</body></html>
