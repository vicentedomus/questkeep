<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffe2ab"/>
      <stop offset="50%" stop-color="#ffbf00"/>
      <stop offset="100%" stop-color="#ffe2ab"/>
    </linearGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffbf00"/>
      <stop offset="50%" stop-color="#ffe2ab"/>
      <stop offset="100%" stop-color="#ffbf00"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#131313"/>
  <!-- Outer ring (halo) -->
  <ellipse cx="256" cy="200" rx="140" ry="50" fill="none" stroke="url(#ring)" stroke-width="14" opacity="0.9" filter="url(#glow)"/>
  <!-- Inner glow of halo -->
  <ellipse cx="256" cy="200" rx="140" ry="50" fill="none" stroke="#ffe2ab" stroke-width="4" opacity="0.4"/>
  <!-- Letter H -->
  <text x="256" y="340" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-weight="700" font-size="220" fill="url(#gold)" filter="url(#glow)">H</text>
  <!-- Subtitle -->
  <text x="256" y="420" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="600" font-size="42" fill="#9c8f78" letter-spacing="16">HALO</text>
  <!-- Bottom decorative line -->
  <line x1="156" y1="445" x2="356" y2="445" stroke="#9c8f78" stroke-width="2" opacity="0.5"/>
</svg>
