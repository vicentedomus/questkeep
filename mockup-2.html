<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mockup 2 — Arcane Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Cinzel+Decorative:wght@700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden}

body{
  background:#06040e;
  display:flex;
  align-items:center;
  justify-content:center;
  min-height:100vh;
  font-family:'Cinzel',serif;
  overflow:hidden;
  position:relative;
}

/* ── STARFIELD ── */
.stars{
  position:absolute;inset:0;
  background:
    radial-gradient(1px 1px at 10% 20%, #fff 100%, transparent),
    radial-gradient(1px 1px at 25% 8%, rgba(255,255,255,.7) 100%, transparent),
    radial-gradient(1px 1px at 40% 35%, #fff 100%, transparent),
    radial-gradient(1px 1px at 55% 12%, rgba(255,255,255,.5) 100%, transparent),
    radial-gradient(1px 1px at 70% 28%, #fff 100%, transparent),
    radial-gradient(1px 1px at 85% 6%, rgba(255,255,255,.8) 100%, transparent),
    radial-gradient(1px 1px at 15% 55%, rgba(255,255,255,.4) 100%, transparent),
    radial-gradient(1px 1px at 60% 50%, rgba(255,255,255,.6) 100%, transparent),
    radial-gradient(1px 1px at 90% 45%, #fff 100%, transparent),
    radial-gradient(1px 1px at 5% 75%, rgba(255,255,255,.5) 100%, transparent),
    radial-gradient(1px 1px at 33% 80%, rgba(255,255,255,.3) 100%, transparent),
    radial-gradient(1px 1px at 75% 70%, rgba(255,255,255,.7) 100%, transparent),
    radial-gradient(1px 1px at 48% 90%, rgba(255,255,255,.4) 100%, transparent),
    radial-gradient(1px 1px at 92% 85%, #fff 100%, transparent),
    radial-gradient(2px 2px at 20% 40%, rgba(180,160,255,.6) 100%, transparent),
    radial-gradient(2px 2px at 80% 15%, rgba(200,180,255,.5) 100%, transparent),
    radial-gradient(2px 2px at 50% 65%, rgba(180,160,255,.4) 100%, transparent);
  pointer-events:none;
}
.stars::after{
  content:'';
  position:absolute;inset:0;
  background:
    radial-gradient(ellipse 100% 100% at 50% 50%, transparent 30%, #06040e 80%);
}

/* ── PORTAL RING ── */
.portal-wrap{
  position:absolute;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  width:clamp(340px,60vw,680px);
  height:clamp(340px,60vw,680px);
  pointer-events:none;
}

.portal-ring{
  position:absolute;inset:0;
  border-radius:50%;
  background:conic-gradient(
    from 0deg,
    #4400aa, #7722ee, #aa44ff, #cc88ff, #aa44ff, #7722ee,
    #4400aa, #220066, #1100aa, #4422dd, #7744ff, #aa66ff,
    #4400aa
  );
  animation:ring-rotate 8s linear infinite;
  filter:blur(2px);
  opacity:.85;
}
@keyframes ring-rotate{to{transform:rotate(360deg)}}

.portal-ring::before{
  content:'';
  position:absolute;
  inset:8px;
  border-radius:50%;
  background:#06040e;
}
.portal-ring::after{
  content:'';
  position:absolute;
  inset:-12px;
  border-radius:50%;
  background:radial-gradient(ellipse at 50% 50%,
    transparent 45%,
    rgba(120,60,220,.35) 55%,
    rgba(80,30,180,.2) 65%,
    transparent 75%);
  filter:blur(15px);
  animation:ring-rotate 6s linear infinite reverse;
}

/* Inner portal glow */
.portal-inner{
  position:absolute;
  inset:16px;
  border-radius:50%;
  background:radial-gradient(ellipse at 50% 50%,
    rgba(80,40,160,.4) 0%,
    rgba(40,20,100,.2) 50%,
    transparent 70%);
  animation:inner-pulse 3s ease-in-out infinite alternate;
}
@keyframes inner-pulse{
from{opacity:.6}
to{opacity:1}
}

/* Floating rune particles */
.rune{
  position:absolute;
  color:rgba(160,100,255,.6);
  font-size:1.1rem;
  animation:float-rune linear infinite;
  pointer-events:none;
  text-shadow:0 0 8px rgba(160,100,255,.8);
}
@keyframes float-rune{
  0%  {transform:translateY(20px) rotate(0deg);opacity:0}
  15% {opacity:.7}
  85% {opacity:.5}
  100%{transform:translateY(-120px) rotate(180deg);opacity:0}
}

/* ── GROUND/FLOOR ── */
.ground{
  position:absolute;
  bottom:0;left:0;right:0;
  height:30%;
  background:
    radial-gradient(ellipse 70% 60% at 50% 100%,
      rgba(80,40,160,.3) 0%,
      rgba(40,20,100,.15) 40%,
      transparent 100%);
  /* Reflection of portal on floor */
}

/* ── PANEL ── */
.panel{
  position:relative;
  z-index:50;
  width:clamp(280px,84vw,350px);
  padding:28px 28px 24px;
  text-align:center;
  /* Deep space dark panel */
  background:
    linear-gradient(160deg,
      rgba(18,10,36,.97) 0%,
      rgba(12,6,28,.98) 100%);
  border:1px solid rgba(140,80,255,.6);
  box-shadow:
    0 0 0 1px rgba(80,40,180,.4),
    0 0 40px rgba(100,40,220,.3),
    0 0 80px rgba(80,30,180,.15),
    inset 0 0 60px rgba(80,40,160,.08);
}
.panel::before{
  content:'';
  position:absolute;inset:4px;
  border:1px solid rgba(140,80,255,.2);
  pointer-events:none;
}
/* Glowing top line */
.panel::after{
  content:'';
  position:absolute;
  top:0;left:20%;right:20%;height:2px;
  background:linear-gradient(90deg,transparent,rgba(180,100,255,.8),transparent);
  box-shadow:0 0 10px rgba(180,100,255,.6);
}

.logo{
  font-family:'Cinzel Decorative',serif;
  font-size:clamp(2rem,4.5vw,3rem);
  font-weight:900;
  letter-spacing:.3em;
  background:linear-gradient(180deg,#e0c0ff 0%,#c090ff 40%,#9060dd 100%);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  filter:drop-shadow(0 0 12px rgba(180,100,255,.7));
  margin-bottom:4px;
}
.sub{
  font-size:.72rem;
  color:rgba(160,120,220,.7);
  letter-spacing:.18em;
  margin-bottom:20px;
}
.divider{
  height:1px;
  background:linear-gradient(90deg,transparent,rgba(140,80,255,.6),transparent);
  margin-bottom:20px;
  position:relative;
}
.divider::before,.divider::after{
  content:'✦';
  position:absolute;
  top:50%;transform:translateY(-50%);
  color:rgba(160,100,255,.7);
  font-size:.6rem;
}
.divider::before{left:25%}
.divider::after{right:25%}

input[type=password]{
  width:100%;padding:9px 14px;
  background:rgba(60,20,120,.3);
  border:1px solid rgba(120,70,220,.5);
  border-bottom:2px solid rgba(160,90,255,.6);
  color:#d0b0ff;
  font-family:'Cinzel',serif;font-size:.82rem;
  letter-spacing:.1em;outline:none;transition:all .2s;
  margin-bottom:14px;text-align:center;
}
input:focus{
  border-color:rgba(200,140,255,.8);
  background:rgba(80,30,160,.4);
  box-shadow:0 0 16px rgba(160,100,255,.3);
}
input::placeholder{color:rgba(120,80,180,.5)}

.btn-enter{
  width:100%;padding:11px;
  background:linear-gradient(180deg,
    rgba(100,40,200,.8) 0%,
    rgba(70,25,160,.9) 50%,
    rgba(50,15,130,.95) 100%);
  border:1px solid rgba(160,90,255,.7);
  border-bottom:3px solid rgba(40,10,100,.8);
  color:#e0c0ff;
  font-family:'Cinzel',serif;font-size:.78rem;font-weight:700;
  letter-spacing:.2em;text-transform:uppercase;cursor:pointer;
  transition:all .15s;
  box-shadow:0 0 20px rgba(120,50,220,.25),inset 0 1px 0 rgba(255,255,255,.1);
  text-shadow:0 0 8px rgba(200,150,255,.5);
}
.btn-enter:hover{
  background:linear-gradient(180deg,
    rgba(130,55,230,.9) 0%,
    rgba(100,40,200,.95) 50%,
    rgba(70,25,160,1) 100%);
  box-shadow:0 0 30px rgba(160,80,255,.45),inset 0 1px 0 rgba(255,255,255,.15);
  color:#fff;
}
.btn-enter:active{transform:translateY(2px);border-bottom-width:1px}
.err{margin-top:10px;color:#ff9977;font-size:.75rem;font-style:italic;min-height:16px}
</style>
</head>
<body>

<div class="stars"></div>

<!-- Portal ring -->
<div class="portal-wrap">
  <div class="portal-ring"></div>
  <div class="portal-inner"></div>
</div>

<!-- Floating runes (positioned via JS) -->
<div class="rune" style="left:20%;bottom:10%;animation-duration:5s;animation-delay:0s">ᚠ</div>
<div class="rune" style="left:30%;bottom:5%;animation-duration:7s;animation-delay:1s">ᚢ</div>
<div class="rune" style="left:65%;bottom:8%;animation-duration:6s;animation-delay:2s">ᚦ</div>
<div class="rune" style="left:75%;bottom:12%;animation-duration:8s;animation-delay:.5s">ᚨ</div>
<div class="rune" style="left:10%;bottom:20%;animation-duration:9s;animation-delay:3s">ᚱ</div>
<div class="rune" style="left:85%;bottom:18%;animation-duration:6.5s;animation-delay:1.5s">ᚲ</div>
<div class="rune" style="left:45%;bottom:3%;animation-duration:7.5s;animation-delay:.8s">ᛁ</div>

<div class="ground"></div>

<div class="panel">
  <div class="logo">HALO</div>
  <div class="sub">Campaña de Dungeons &amp; Dragons</div>
  <div class="divider"></div>
  <input type="password" placeholder="Contraseña de acceso...">
  <button class="btn-enter">✦ Entrar al Reino ✦</button>
  <div class="err"></div>
</div>

</body></html>
