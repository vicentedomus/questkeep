<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HALO — Campaña D&D</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Pirata+One&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden}

body{
  display:flex;align-items:center;justify-content:center;
  min-height:100vh;
  font-family:'IM Fell English',serif;
  background:#0e0a06;
}

/* ── BACKGROUND: MURO DE PIEDRA ── */
.bg{position:absolute;inset:0;
  background:radial-gradient(ellipse 90% 70% at 50% 40%,#2a1c0a 0%,#1a1008 40%,#0e0804 100%);
}
.bg::before{
  content:'';position:absolute;inset:0;
  background-image:
    repeating-linear-gradient(0deg,transparent 0,transparent 44px,rgba(0,0,0,.3) 44px,rgba(0,0,0,.3) 47px),
    repeating-linear-gradient(90deg,transparent 0,transparent 66px,rgba(0,0,0,.2) 66px,rgba(0,0,0,.2) 69px);
  opacity:.5;
}
.bg::after{
  content:'';position:absolute;inset:0;
  background:
    radial-gradient(ellipse 60% 70% at 50% 35%,rgba(180,100,20,.16) 0%,transparent 70%),
    radial-gradient(ellipse 100% 40% at 50% 100%,rgba(0,0,0,.9) 0%,transparent 100%),
    radial-gradient(ellipse 100% 30% at 50% 0%,rgba(0,0,0,.7) 0%,transparent 100%);
}

/* ── MARCO DE MADERA ── */
.frame-outer{
  position:relative;z-index:20;
  padding:16px;
  background:
    linear-gradient(135deg,#4a3010 0%,#3a2408 20%,#4a3010 40%,#2e1c06 60%,#3a2408 80%,#4a3010 100%);
  border:3px solid #6a4c1e;
  box-shadow:
    0 0 0 1px #2a1c08,
    0 0 0 5px #3a2808,
    0 0 0 7px #5a3e1a,
    0 20px 60px rgba(0,0,0,.9),
    inset 0 0 20px rgba(0,0,0,.4);
}
.frame-outer::before{
  content:'';position:absolute;inset:0;
  background:repeating-linear-gradient(90deg,transparent 0,transparent 8px,rgba(0,0,0,.08) 8px,rgba(0,0,0,.08) 9px);
  pointer-events:none;
}
.nail{
  position:absolute;width:14px;height:14px;border-radius:50%;
  background:radial-gradient(circle at 35% 35%,#8a7040,#5a4a20 50%,#3a3010);
  border:1px solid #4a3c18;
  box-shadow:0 1px 3px rgba(0,0,0,.6),inset 0 1px 0 rgba(255,255,255,.1);
}
.nail.ntl{top:5px;left:5px}.nail.ntr{top:5px;right:5px}
.nail.nbl{bottom:5px;left:5px}.nail.nbr{bottom:5px;right:5px}

/* ── PANEL DE PERGAMINO ── */
.parchment{
  position:relative;
  width:clamp(270px,80vw,360px);
  padding:30px 28px 24px;
  text-align:center;
  background:linear-gradient(160deg,#c8a86a 0%,#b89050 30%,#aa8444 60%,#bc9660 100%);
  border:1px solid #7a5a28;
  box-shadow:inset 0 0 40px rgba(80,40,0,.3),0 4px 20px rgba(0,0,0,.5);
}
.parchment::before{
  content:'';position:absolute;inset:0;
  background:
    radial-gradient(ellipse at 30% 20%,rgba(255,255,200,.15) 0%,transparent 50%),
    radial-gradient(ellipse at 70% 80%,rgba(100,60,0,.15) 0%,transparent 50%),
    repeating-linear-gradient(0deg,transparent 0,transparent 3px,rgba(0,0,0,.04) 3px,rgba(0,0,0,.04) 4px);
  pointer-events:none;
}
.parchment::after{
  content:'';position:absolute;inset:0;
  box-shadow:inset 0 0 20px rgba(60,30,0,.4),inset 0 0 40px rgba(60,30,0,.2);
  pointer-events:none;
}

/* ── LOGO ── */
.logo{
  font-family:'Pirata One',serif;
  font-size:clamp(3rem,8vw,4.2rem);
  color:#1e1006;
  letter-spacing:.12em;
  line-height:1;
  text-shadow:
    0 1px 0 rgba(255,220,150,.3),
    0 -1px 0 rgba(0,0,0,.35),
    0 3px 8px rgba(0,0,0,.45);
  filter:drop-shadow(0 2px 3px rgba(0,0,0,.4));
  margin-bottom:4px;
}

.sub{
  font-family:'IM Fell English',serif;
  font-style:italic;
  color:#5a3a18;
  font-size:.82rem;
  letter-spacing:.12em;
  margin-bottom:20px;
}

.divider{
  height:2px;
  background:linear-gradient(90deg,transparent,#7a4a18,#5a3010,#7a4a18,transparent);
  margin-bottom:20px;
  position:relative;
}
.divider::before{
  content:'⚜';position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
  color:#5a3010;font-size:.9rem;background:#b89050;padding:0 6px;
}

/* ── FORMULARIO ── */
input[type=password]{
  width:100%;padding:10px 14px;
  background:rgba(60,20,0,.2);
  border:1px solid #7a5028;border-bottom:2px solid #5a3818;
  color:#1e1006;
  font-family:'IM Fell English',serif;font-size:.95rem;
  letter-spacing:.08em;outline:none;transition:border .2s,background .2s;
  margin-bottom:14px;text-align:center;
}
input:focus{
  border-color:#3a2010;
  background:rgba(60,20,0,.3);
  box-shadow:0 0 10px rgba(100,50,0,.15);
}
input::placeholder{color:#8a6a3a}

.btn-enter{
  width:100%;padding:11px;
  background:linear-gradient(180deg,#4a2c0e 0%,#3a2008 55%,#2a1606 100%);
  border:2px solid #6a4018;border-bottom:3px solid #1a1008;
  color:#d4a050;
  font-family:'Cinzel',serif;font-size:.78rem;font-weight:700;
  letter-spacing:.18em;text-transform:uppercase;cursor:pointer;
  transition:all .12s;
  text-shadow:0 1px 2px rgba(0,0,0,.6);
  box-shadow:inset 0 1px 0 rgba(255,200,100,.1),0 2px 8px rgba(0,0,0,.5);
}
.btn-enter:hover{
  background:linear-gradient(180deg,#6a3c14 0%,#4a2c0a 55%,#3a1e08 100%);
  color:#f0c060;
  box-shadow:0 0 14px rgba(180,100,20,.25),inset 0 1px 0 rgba(255,200,100,.15);
}
.btn-enter:active{transform:translateY(2px);border-bottom-width:1px}

.err{margin-top:10px;color:#8b2500;font-size:.75rem;font-style:italic;min-height:16px}
</style>
</head>
<body>

<div class="bg"></div>

<div class="frame-outer">
  <div class="nail ntl"></div><div class="nail ntr"></div>
  <div class="nail nbl"></div><div class="nail nbr"></div>
  <div class="parchment">
    <div class="logo">HALO</div>
    <div class="sub">Campaña de Dungeons &amp; Dragons</div>
    <div class="divider"></div>
    <input type="password" placeholder="Contraseña de acceso...">
    <button class="btn-enter">&#9660; Entrar al Reino &#9660;</button>
    <div class="err"></div>
  </div>
</div>

</body>
</html>
